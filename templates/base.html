<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fortunate Hub</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <!-- AOS Animation CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&family=Bodoni+Moda:wght@400;700&display=swap" rel="stylesheet">
    <!-- Your Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="{% block body_class %}{% endblock %}">

  <!-- Header -->
  <header id="header">
    <nav class="navbar navbar-expand-lg fixed-top">
      <div class="container">

        <!-- Logo -->
        <a class="navbar-brand" href="{{ url_for('index') }}">
          <img src="https://i.postimg.cc/wjKM3k2C/fortunatehub-ilorin-logo3.jpg" alt="Logo" class="img">
          <span class="brand-text">
        <span class="brand-fortunate">FORTUNATE</span>
        <span class="brand-hub">HUB</span>
        </span>
        <span class="brand-diamond">&#9670;</span>
        </a>

        <!-- Toggle -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-expanded="false">
        <span></span>
        </button>

        <!-- nav links -->
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('services') }}">Services</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('about') }}">About Us</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Sign In</a>
            </li>
          </ul>
          <a href="#" class="btn-getstarted ms-3">Get Started</a>
        </div>

      </div>
    </nav>
  </header>
  <!-- end header -->
  
  <!-- main -->
  <main id="main">
    {% block main %}{% endblock %}
  </main>
  <!-- End Main -->

  <!-- footer -->
  <footer id="footer">
    <div class="container">
    <div class="row">
      <div class="col-md-6">
        <h5>Address</h5>
        <p>Ibrahim Taiwo Rd, Beside Firstbank, Isale, Illorin 240211, Kwara.</p>
      </div>
      <div class="col-md-6">
        <h5>Contact</h5>
        <p>Phone: +2347079134149, 07070646407</p>
        <p>Email: Fortunatebread@gmail.com</p>
      </div>
    </div>
    </div>
  </footer>
  <!-- footer end -->

  <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- AOS Animation JS -->
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

    <!-- Swiper JS (for slideshow on homepage) -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='main.js') }}"></script>

    {% block scripts %}{% endblock %}

</body>
</html>
